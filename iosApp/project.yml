name: FitBot
options:
  bundleIdPrefix: com.fitness
targets:
  FitBot:
    type: application
    platform: iOS
    deploymentTarget: "14.1"
    sources:
      - iosApp
    settings:
      base:
        INFOPLIST_FILE: iosApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.fitness.FitBot
        MARKETING_VERSION: 0.4.1
        CURRENT_PROJECT_VERSION: 9
        PRODUCT_NAME: FitBot
        DEVELOPMENT_TEAM: ""
        # DYNAMIC SEARCH PATHS:
        # First priority: where embedAndSign task copies it
        # Second priority: fallback to gradle bin directories using macros
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../app/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
          - "$(SRCROOT)/../app/build/bin/$(PLATFORM_NAME)Arm64/debugFramework"
          - "$(SRCROOT)/../app/build/bin/$(PLATFORM_NAME)X64/debugFramework"
        OTHER_LDFLAGS: $(inherited) -framework ComposeApp
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    preBuildPhases:
      - name: "Compile Kotlin Multiplatform"
        script: |
          cd "$SRCROOT/.."
          export JAVA_HOME="$SRCROOT/../jdk-17.0.10+7/Contents/Home"
          ./gradlew :app:embedAndSignAppleFrameworkForXcode
        executionPosition: beforeCompile

schemes:
  FitBot:
    build:
      targets:
        FitBot: [run, test, profile, analyze, archive]
    run:
      config: Debug
    archive:
      config: Release
