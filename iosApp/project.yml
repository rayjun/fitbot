name: FitBot
options:
  bundleIdPrefix: com.fitness
targets:
  FitBot:
    type: application
    platform: iOS
    deploymentTarget: "14.1"
    sources:
      - iosApp
    dependencies:
      - framework: ../app/build/xcode-frameworks/Debug/iphonesimulator/ComposeApp.framework
        embed: false # The script handles embedding
        link: true
    settings:
      base:
        INFOPLIST_FILE: iosApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.fitness.FitBot
        MARKETING_VERSION: 0.4.1
        CURRENT_PROJECT_VERSION: 9
        PRODUCT_NAME: FitBot
        DEVELOPMENT_TEAM: ""
        FRAMEWORK_SEARCH_PATHS: $(inherited) $(SRCROOT)/../app/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    preBuildPhases:
      - name: Compile KMP Framework
        script: |
          cd "$SRCROOT/.."
          ./gradlew :app:embedAndSignAppleFrameworkForXcode
        executionPosition: beforeCompile

schemes:
  FitBot:
    build:
      targets:
        FitBot: [run, test, profile, analyze, archive]
    run:
      config: Debug
    archive:
      config: Release
