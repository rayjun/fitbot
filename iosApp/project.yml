name: FitBot
options:
  bundleIdPrefix: com.fitness
targets:
  FitBot:
    type: application
    platform: iOS
    deploymentTarget: "14.1"
    sources:
      - iosApp
    settings:
      base:
        INFOPLIST_FILE: iosApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.fitness.FitBot
        MARKETING_VERSION: 0.4.1
        CURRENT_PROJECT_VERSION: 9
        PRODUCT_NAME: FitBot
        DEVELOPMENT_TEAM: ""
        # Link the framework name, but don't hardcode its path in the linker
        OTHER_LDFLAGS: $(inherited) -framework ComposeApp
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        Debug:
          # CONDITIONAL SEARCH PATHS:
          # Tells Xcode exactly where to find the module for each specific SDK
          "FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]": "$(inherited) $(SRCROOT)/../app/build/bin/iosSimulatorArm64/debugFramework"
          "FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]": "$(inherited) $(SRCROOT)/../app/build/bin/iosArm64/debugFramework"
        Release:
          "FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]": "$(inherited) $(SRCROOT)/../app/build/bin/iosSimulatorArm64/releaseFramework"
          "FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]": "$(inherited) $(SRCROOT)/../app/build/bin/iosArm64/releaseFramework"
    preBuildPhases:
      - name: "Compile Kotlin Multiplatform"
        script: |
          cd "$SRCROOT/.."
          export JAVA_HOME="$SRCROOT/../jdk-17.0.10+7/Contents/Home"
          ./gradlew :app:embedAndSignAppleFrameworkForXcode
        executionPosition: beforeCompile

schemes:
  FitBot:
    build:
      targets:
        FitBot: [run, test, profile, analyze, archive]
    run:
      config: Debug
    archive:
      config: Release
