name: FitBot
options:
  bundleIdPrefix: com.fitness
targets:
  FitBot:
    type: application
    platform: iOS
    deploymentTarget: "14.1"
    sources:
      - iosApp
    dependencies:
      - framework: ../app/build/bin/iosSimulatorArm64/debugFramework/ComposeApp.framework
        embed: true
    settings:
      base:
        INFOPLIST_FILE: iosApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.fitness.FitBot
        MARKETING_VERSION: 0.4.1
        CURRENT_PROJECT_VERSION: 9
        PRODUCT_NAME: FitBot
        DEVELOPMENT_TEAM: ""
        FRAMEWORK_SEARCH_PATHS: $(inherited) $(SRCROOT)/../app/build/bin/iosSimulatorArm64/debugFramework
        # Add a flag to skip KMP build if needed
        KMP_BUILD_ENABLED: "YES"
    preBuildPhases:
      - name: "Compile Kotlin Multiplatform"
        script: |
          if [ "$KMP_BUILD_ENABLED" = "NO" ]; then
            echo "KMP Build disabled, skipping..."
            exit 0
          fi
          cd "$SRCROOT/.."
          # Force the specific simulator build for now to ensure path consistency
          ./gradlew :app:linkDebugFrameworkIosSimulatorArm64
        executionPosition: beforeCompile

schemes:
  FitBot:
    build:
      targets:
        FitBot: [run, test, profile, analyze, archive]
    run:
      config: Debug
    archive:
      config: Release
