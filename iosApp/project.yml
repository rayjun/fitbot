name: FitBot
options:
  bundleIdPrefix: com.fitness
targets:
  FitBot:
    type: application
    platform: iOS
    deploymentTarget: "14.1"
    sources:
      - iosApp
    settings:
      base:
        INFOPLIST_FILE: iosApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.fitness.FitBot
        MARKETING_VERSION: 0.4.1
        CURRENT_PROJECT_VERSION: 9
        PRODUCT_NAME: FitBot
        DEVELOPMENT_TEAM: ""
        # Robust search paths for KMP framework
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../app/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME) $(SRCROOT)/../app/build/bin/iosSimulatorArm64/debugFramework $(SRCROOT)/../app/build/bin/iosArm64/debugFramework"
        OTHER_LDFLAGS: "$(inherited) -framework ComposeApp"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    preBuildPhases:
      - name: "Compile Kotlin Multiplatform"
        script: |
          cd "$SRCROOT/.."
          export JAVA_HOME="$SRCROOT/../jdk-17.0.10+7/Contents/Home"
          ./gradlew :app:embedAndSignAppleFrameworkForXcode
        executionPosition: beforeCompile

schemes:
  FitBot:
    build:
      targets:
        FitBot: [run, test, profile, analyze, archive]
    run:
      config: Debug
    archive:
      config: Release
